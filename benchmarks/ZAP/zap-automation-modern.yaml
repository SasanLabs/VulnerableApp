---
# ---------------------------------------------------------------------------
# ZAP by Checkmarx Automation Framework Plan
# Scans VulnerableApp modern UI and writes a JSON report consumed by the benchmark.
#
# Usage:
#     NETWORK=$(docker inspect $(docker compose -f docker-compose.without_llm.yml ps -q | head -1) \
#       --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')
#     docker run --network "$NETWORK" \
#       --shm-size=8g \
#       -v "$(pwd)/benchmarks/ZAP:/zap/wrk/:rw" \
#       ghcr.io/zaproxy/zaproxy:weekly \
#       bash -c "
#         zap.sh -daemon \
#           -addonupdate \
#           -addoninstallall \
#           -autorun /zap/wrk/zap-automation-modern.yaml
#       "
#
# The JSON report is written to benchmarks/ZAP/zap-raw-report.json.
# Run convert_zap_to_benchmark.py afterwards to produce the benchmark input.
# ---------------------------------------------------------------------------

env:
  contexts:
    - name: VulnerableApp-modern
      urls:
        - http://VulnerableApp-facade
      includePaths:
        - http://VulnerableApp-facade.*
        - http://VulnerableApp-base:9090.*
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true
    
jobs:         
  # ------------------------------------------------------------------
  # 1. Spider — crawl VulnerableApp to discover all endpoints
  # ------------------------------------------------------------------
  - type: spider
    parameters:
      context: VulnerableApp-modern
      url: http://VulnerableApp-facade
      maxDuration: 20         # minutes
      maxDepth: 100
      acceptCookies: true

  # ------------------------------------------------------------------
  # 2. Ajax Spider — picks up JS-rendered pages the traditional spider misses
  # ------------------------------------------------------------------
  - type: spiderAjax
    parameters:
      context: VulnerableApp-modern
      url: http://VulnerableApp-facade
      maxDuration: 20         # minutes
      maxCrawlDepth: 0
      maxCrawlStates: 0        # unlimited
      reloadWait: 2000
      eventWait: 1500
      browserId: firefox-headless
      clickDefaultElems: true
      clickElemsOnce: true
      randomInputs: true

  # ------------------------------------------------------------------
  # 3. Passive Scan Wait — wait for passive scan to complete before active scan
  # ------------------------------------------------------------------ 

  - type: passiveScan-wait
    parameters:
      maxDuration: 20         # minutes

  # ------------------------------------------------------------------
  # 4. Active Scan — attack mode against discovered URLs
  # ------------------------------------------------------------------
  - type: activeScan
    parameters:
      context: VulnerableApp-modern
      maxRuleDurationInMins: 5
      maxScanDurationInMins: 120
    policyDefinition:
      defaultStrength: INSANE
      defaultThreshold: LOW

  # ------------------------------------------------------------------
  # 5. Report — JSON format, written to benchmarks/zap-raw-report.json
  # ------------------------------------------------------------------
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-raw-report
      reportTitle: VulnerableApp ZAP Scan (Modern UI)
      reportDescription: "DAST scan of OWASP VulnerableApp modern UI for benchmark evaluation"
    risks:
      - high
      - medium
      - low
