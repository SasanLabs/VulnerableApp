---
# ---------------------------------------------------------------------------
# ZAP by Checkmarx Automation Framework Plan
# Scans VulnerableApp and writes a JSON report consumed by the benchmark.
#
# Usage:
#   docker run --network host \
#     -v $(pwd)/benchmarks:/zap/wrk/:rw \
#     ghcr.io/zaproxy/zaproxy:stable \
#     zap.sh -cmd -autorun /zap/wrk/zap-automation.yaml
#
# The JSON report is written to benchmarks/ZAP/zap-raw-report.json.
# Run convert_zap_to_benchmark.py afterwards to produce the benchmark input.
# ---------------------------------------------------------------------------

env:
  contexts:
    - name: VulnerableApp
      urls:
        - http://localhost
      includePaths:
        - "http://localhost.*"
      excludePaths:
        - "http://localhost/logout.*"
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

jobs:         

  # ------------------------------------------------------------------
  # 1. Spider — crawl VulnerableApp to discover all endpoints
  # ------------------------------------------------------------------
  - type: spider
    parameters:
      context: VulnerableApp
      url: http://localhost
      maxDuration: 5          # minutes
      maxDepth: 10
      acceptCookies: true

  # ------------------------------------------------------------------
  # 2. Ajax Spider — picks up JS-rendered pages the traditional spider misses
  # ------------------------------------------------------------------
  - type: spiderAjax
    parameters:
      context: VulnerableApp
      url: http://localhost
      maxDuration: 5         # minutes
      browserId: firefox-headless

  # ------------------------------------------------------------------
  # 3. Active Scan — attack mode against discovered URLs
  # ------------------------------------------------------------------
  - type: activeScan
    parameters:
      context: VulnerableApp
      policy: defaultPolicy
      maxRuleDurationInMins: 0
      maxScanDurationInMins: 0
      strength: INSANE
      threshold: LOW

  # ------------------------------------------------------------------
  # 4. Report — JSON format, written to benchmarks/zap-raw-report.json
  # ------------------------------------------------------------------
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-raw-report
      reportTitle: VulnerableApp ZAP Scan
      reportDescription: "DAST scan of OWASP VulnerableApp for benchmark evaluation"
    risks:
      - high
      - medium
      - low
      - informational
