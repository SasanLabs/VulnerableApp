---
# ---------------------------------------------------------------------------
# ZAP by Checkmarx Automation Framework Plan
# Scans VulnerableApp legacy UI and writes a JSON report consumed by the
# benchmark.
#
# Usage:
#     NETWORK=$(docker inspect $(docker compose -f docker-compose.without_llm.yml ps -q | head -1) \
#       --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')
#     docker run --network "$NETWORK" \
#       --shm-size=8g \
#       -v "$(pwd)/benchmarks/ZAP:/zap/wrk/:rw" \
#       ghcr.io/zaproxy/zaproxy:weekly \
#       bash -c "
#         zap.sh -cmd \
#           -addonupdate \
#           -addoninstallall \
#           -autorun /zap/wrk/zap-automation-legacy.yaml
#       "
#
# The JSON report is written to benchmarks/ZAP/zap-raw-report-legacy.json.
# Run convert_zap_to_benchmark.py afterwards to produce the benchmark input.
# ---------------------------------------------------------------------------

env:
  contexts:
    - name: VulnerableApp-legacy
      urls:
        - http://VulnerableApp-facade/VulnerableApp
      includePaths:
        - "http://VulnerableApp-facade/VulnerableApp.*"
        - "http://VulnerableApp-base:9090/VulnerableApp.*"
  parameters:
    failOnError: false
    failOnWarning: false
    progressToStdout: true
    
jobs:
  # ------------------------------------------------------------------
  # 1. Spider — crawl VulnerableApp legacy endpoints
  # ------------------------------------------------------------------
  - type: spider
    parameters:
      context: VulnerableApp-legacy
      url: http://VulnerableApp-facade/VulnerableApp
      maxDuration: 20         # minutes
      maxDepth: 100
      acceptCookies: true

  # ------------------------------------------------------------------
  # 2. Ajax Spider — picks up JS-rendered pages the traditional spider misses
  # ------------------------------------------------------------------
  - type: spiderAjax
    parameters:
      context: VulnerableApp-legacy
      url: http://VulnerableApp-facade/VulnerableApp
      maxDuration: 120         # minutes
      maxCrawlDepth: 0
      maxCrawlStates: 0
      reloadWait: 2000
      eventWait: 1500
      browserId: firefox-headless
      clickDefaultElems: true   
      clickElemsOnce: false
      randomInputs: true

  # ------------------------------------------------------------------
  # 3. Passive Scan Wait — wait for passive scan to complete before active scan
  # ------------------------------------------------------------------ 

  - type: passiveScan-wait
    parameters:
      maxDuration: 20         # minutes

  # ------------------------------------------------------------------
  # 4. Active Scan Configuration
  # ------------------------------------------------------------------ 

  - type: activeScan-config
    parameters: {}
    inputVectors:
      urlQueryStringAndDataDrivenNodes:
        enabled: true
        addParam: true
      postData:
        enabled: true
        multiPartFormData: true
        xml: true
        json:
          enabled: true
      urlPath: false
      httpHeaders:
        enabled: true
        allRequests: true
      cookieData:
        enabled: true

  # ------------------------------------------------------------------
  # 5. Active Scan — insane mode for maximum vulnerability coverage
  # ------------------------------------------------------------------
  - type: activeScan
    parameters:
      context: VulnerableApp-legacy
      maxRuleDurationInMins: 20
      maxScanDurationInMins: 180
    policyDefinition:
      defaultStrength: INSANE
      defaultThreshold: LOW

  # ------------------------------------------------------------------
  # 6. Report — JSON format, written to benchmarks/ZAP/zap-raw-report-legacy.json
  # ------------------------------------------------------------------
  - type: report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-raw-report-legacy
      reportTitle: VulnerableApp ZAP Scan (Legacy UI)
      reportDescription: "DAST scan of OWASP VulnerableApp legacy UI for benchmark evaluation"
    risks:
      - high
      - medium
      - low
