<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VulnerableApp - Redirect Blocked</title>
    <link rel="stylesheet" href="blocked.css" />
</head>
<body>
    <nav>OWASP VulnerableApp</nav>

    <div class="page">
        <div class="auth-shell">
            <h3 class="auth-title">Redirect Blocked</h3>
            <p class="auth-subtitle">This destination is not approved for redirection.</p>

            <div class="auth-card secure-card">
                <h5>Blocked destination</h5>
                <div id="blockedTarget" class="url-box"></div>

                <div class="info-box">
                    Only approved internal paths are allowed to reduce phishing risk.
                    Try using <strong>/VulnerableApp/</strong>.
                </div>

                <button id="returnBtn" onclick="window.location.href='/VulnerableApp/'">
                    Return to VulnerableApp
                </button>
            </div>
        </div>
    </div>

    <script src="blocked.js"></script>
</body>
</html>
