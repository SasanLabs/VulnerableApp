<div id="criteria_qb">
    <div id="employeeLookup">
        <div id="heading">Employee directory (Criteria API)</div>

        <div id="filterPanel">
            <div>Look up by attribute (used at levels 1, 3 and 4):</div>
            <input type="text" id="qbField" placeholder="field e.g. department" value="department"/>
            <input type="text" id="qbValue" placeholder="value e.g. Engineering" value="Engineering"/>
            <button id="qbFilterBtn">Filter</button>
        </div>

        <div id="sortPanel">
            <div>Sort the Engineering team by attribute (used at level 2):</div>
            <input type="text" id="qbSort" placeholder="sort field e.g. name" value="name"/>
            <button id="qbSortBtn">Sort</button>
        </div>

        <div id="qbResponse"></div>
    </div>
</div>
