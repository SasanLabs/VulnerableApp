<div id="cachePoisoningLevel1">
    <div class="cache-poisoning-panel">
        <h2 class="cache-poisoning-title">Shared cache keyed only by route</h2>
        <p class="cache-poisoning-copy">
            Send one request as the attacker with a custom banner and then a second request as the
            victim without the query parameter.
        </p>

        <label class="cache-poisoning-label" for="bannerInput">Banner</label>
        <input
            class="cache-poisoning-input"
            type="text"
            id="bannerInput"
            value="FAKE URGENT UPDATE" />

        <div class="cache-poisoning-actions">
            <button id="poisonCacheBtn">Send attacker request</button>
            <button id="victimRequestBtn">Send victim request</button>
        </div>

        <div class="cache-poisoning-diagnostics">
            <div class="diagnostic-card">
                <span class="diagnostic-label">Cache status</span>
                <code id="cacheStatus">-</code>
            </div>
            <div class="diagnostic-card">
                <span class="diagnostic-label">Cache key</span>
                <code id="cacheKey">-</code>
            </div>
        </div>

        <div id="cachePoisoningResponse" class="cache-poisoning-output">
            Use the buttons above to poison the cache and replay the cached response.
        </div>
    </div>
</div>
