NOSQL_AUTH_BYPASS_NE_NULL=The login endpoint is fronted by a GraphQL resolver whose <code>username</code> and <code>password</code> arguments are typed as the permissive <code>Any</code> scalar. Because <code>Any</code> passes any JSON value through unchanged, an operator document substituted for the expected string flows straight into a Spring Data <code>Criteria</code>, where it is rendered as a BSON operator and matches the first user.<br/>\
 <b>How to exploit this level?</b><br/>\
 Send a POST request to the level URL with the following GraphQL body:<br/>\
 <code>{"query": "query($u: Any!, $p: Any!) { login(username: $u, password: $p) { loggedIn username } }", "variables": {"u": {"$ne": null}, "p": {"$ne": null}}}</code><br/>\
 The resulting Mongo query becomes <code>{username: {$ne: null}, password: {$ne: null}}</code>, which matches the first user in the collection and returns <code>{"loggedIn": true}</code> &mdash; logging the attacker in without knowing any credentials. The same payload also works directly from the level UI: paste <code>{"$ne": null}</code> into both input fields and click Login.
