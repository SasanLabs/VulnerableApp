COMMAND_INJECTION_GRAPHQL_SHELL_METACHAR=The <code>runPing</code> mutation accepts an <code>ipaddress: String!</code> argument that the resolver concatenates straight into a <code>sh -c "ping -c 2 &lt;ip&gt;"</code> command. Because GraphQL's built-in <code>String</code> scalar passes shell metacharacters through unchanged, any payload containing <code>;</code>, <code>|</code>, <code>&amp;&amp;</code>, <code>$()</code>, or backticks is interpreted by the shell.<br/>\
 <b>How to exploit this level?</b><br/>\
 Send a POST request to the level URL with the following GraphQL body:<br/>\
 <code>{"query": "mutation($ip: String!) { runPing(ipaddress: $ip) { output } }", "variables": {"ip": "127.0.0.1; cat /etc/passwd"}}</code><br/>\
 The shell sees two commands &mdash; the ping plus <code>cat /etc/passwd</code> &mdash; and the file contents are returned in the <code>output</code> field.<br/>\
 <b>GraphQL-specific amplification</b>: a single request can alias the mutation N times so the injected command runs N times, e.g. <code>mutation($ip: String!) { a: runPing(ipaddress: $ip){output} b: runPing(ipaddress: $ip){output} c: runPing(ipaddress: $ip){output} }</code>. The level UI exposes this via the &ldquo;Batch x5&rdquo; checkbox.
