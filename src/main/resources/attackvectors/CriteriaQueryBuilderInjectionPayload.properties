CRITERIA_QB_INJECTION_PAYLOAD_LEVEL_1=The endpoint is intended to look up employees by department, but \"field\" is forwarded as the JPA attribute path. Confirm an SSN exists in the table by probing it directly:<br/>\
<code>?field=socialSecurityNumber&value=123-45-6789</code><br/>\
If an EmployeeView comes back, you have just confirmed which employee owns that SSN without the SSN ever appearing in the response.
CRITERIA_QB_INJECTION_PAYLOAD_LEVEL_2=The endpoint returns Engineering employees sorted by an attacker-chosen field. The response never includes salary, but the row order leaks it:<br/>\
<code>?sort=salary</code> returns Engineers in ascending salary order — the first row is the lowest paid Engineer, the last is the highest.<br/>\
<code>?sort=socialSecurityNumber</code> orders by SSN, letting you correlate employees with neighbouring SSNs.
CRITERIA_QB_INJECTION_PAYLOAD_LEVEL_3=A blacklist now rejects \"field\" values containing \"salary\" or \"ssn\" (case-insensitive). The JPA attribute for the SSN column is <code>socialSecurityNumber</code>, which contains neither substring:<br/>\
<code>?field=socialSecurityNumber&value=123-45-6789</code><br/>\
This bypasses the blacklist and produces the same oracle as level 1.
