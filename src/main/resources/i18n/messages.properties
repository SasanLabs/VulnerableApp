# Cryptographic Failures Vulnerability
CRYPTOGRAPHIC_FAILURES_VULNERABILITY=Cryptographic Failures occur when sensitive data is not properly protected using strong cryptographic algorithms and secure storage mechanisms. \
This vulnerability can lead to exposure of sensitive information such as passwords, credit card numbers, personal data, and authentication tokens. \
Common issues include: using weak hashing algorithms (MD5, SHA1), storing data in plaintext, using broken encryption algorithms (DES, RC4), \
and improper key management. <br/><br/>\
You can explore the database contents directly at the H2 Console and to find and crack the secrets: </br> \
Legacy UI: <a href="http://localhost:9090/VulnerableApp/h2/\" target="_blank">http://localhost:9090/VulnerableApp/h2/ </a></br> \
Docker UI: <a href="http://localhost/VulnerableApp/h2/login.jsp\" target="_blank">http://localhost/VulnerableApp/h2/login.jsp</a></br><br/> \
<ul>  <li><b>URL:</b> jdbc:h2:mem:testdb</li> \
  <li><b>Username:</b> cryptographic_failures_user</li> \
  <li><b>Password:</b> cryptographic_failures_password</li> \
 </ul><br/> \
Important Links:<br/>\
<ol> <li> <a href="https://owasp.org/Top10/A02_2021-Cryptographic_Failures/" target="_blank">OWASP Top 10 - A02:2021 Cryptographic Failures</a>  \
 <li> <a href="https://cwe.mitre.org/data/definitions/327.html" target="_blank">CWE-327: Use of a Broken or Risky Cryptographic Algorithm</a> \
 <li> <a href="https://cwe.mitre.org/data/definitions/326.html" target="_blank">CWE-326: Inadequate Encryption Strength</a> \
 <li> <a href="https://cwe.mitre.org/data/definitions/330.html" target="_blank">CWE-330: Use of Insufficiently Random Values</a> \
</ol>
#### Attack Vector Description
CRYPTOGRAPHIC_FAILURES_PLAINTEXT_STORAGE=Password is stored and returned in plaintext without any encryption or hashing, making it immediately visible in the API response.
CRYPTOGRAPHIC_FAILURES_BASE64_ENCODING=Password is "encrypted" using Base64 encoding which is not encryption at all. The user must decode the Base64 string to find the original password.
CRYPTOGRAPHIC_FAILURES_INSECURE_CIPHER=Password is encrypted using a Caesar Cipher which is not cryptographically secure. The user must crack the password by decrypting the cipher.
CRYPTOGRAPHIC_FAILURES_SECURITY_BY_OBSCURITY=Password is encrypted with custom logic then Base64 encoded to obscure the cipher text. The user must crack the password by recognizing the encoding and crack the cipher.
CRYPTOGRAPHIC_FAILURES_MD4_HASHING=Password is hashed using MD4 algorithm which is deprecated and should never be used. The user must crack the MD4 hash using rainbow tables or online tools to find the original password.
CRYPTOGRAPHIC_FAILURES_MD5_HASHING=Password is hashed using MD5 algorithm which is cryptographically broken. The user must crack the MD5 hash using rainbow tables or online tools to find the original password.
CRYPTOGRAPHIC_FAILURES_SHA1_HASHING=Password is hashed using SHA1 algorithm which is deprecated. The user must crack the SHA1 hash using rainbow tables or online tools to find the original password.
CRYPTOGRAPHIC_FAILURES_LM_HASHING=Password is hashed using LM algorithm which has been compromised. The user is shown how the LM hash is vulnerable and easy to crack.
CRYPTOGRAPHIC_FAILURES_SHA256_HASHING=Password is hashed using SHA-256 without a salt, making it vulnerable to rainbow table and precomputed hash attacks. The user must crack the SHA-256 hash using online tools to find the original password.
CRYPTOGRAPHIC_FAILURES_INSECURE_AES128=Password is encrypted with AES-128 but implemented with a weak key making it insecure to brute-force attacks. Encryption is a two-way function meaning that anyone with the key can decrypt the password. The user must crack the password using common password lists or key-recovery techniques.
CRYPTOGRAPHIC_FAILURES_SECURE_BCRYPT=Password is hashed using Bcrypt with salt with a work factor (strength) of at least 4, making any type of brute-force or rainbow table attacks infeasible.

### IDOR Vulnerability
IDOR_VULNERABILITY=<b>Insecure Direct Object Reference (IDOR)</b> is an access control vulnerability where an application exposes a reference to an internal object (such as a database ID, file name, or user identifier) and fails to verify whether the user is authorized to access that object.\
This allows attackers to manipulate identifiers in requests (URL, API call, form parameter, etc.) to access resources belonging to other users.\
IDOR is commonly discussed in the Broken Access Control category in the OWASP security framework and the OWASP Top 10.\<br/><br/>\
Important Links:<br/>\
<ol> <li> <a href="https://www.youtube.com/watch?v=JopQ38v-LYQ" target="_blank">Insecure Direct Object Reference (IDOR) Explained</a> \
 <li> <a href="https://cheatsheetseries.owasp.org/cheatsheets/Insecure_Direct_Object_Reference_Prevention_Cheat_Sheet.html" target="_blank">OWASP Insecure Direct Object Reference Prevention Cheat Sheet</a>  \
 <li> <a href="https://portswigger.net/web-security/access-control/idor" target="_blank">IDOR Lab portswigger</a> \
 <li> <a href="https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/05-Authorization_Testing/04-Testing_for_Insecure_Direct_Object_References" target="_blank">OWASP Web Security Testing Guide - Testing for Insecure Direct Object References</a> \
</ol>
IDOR_LEVEL_1_NO_AUTHORIZATION=Secure login, but missing object-level authorization. Any authenticated user can access all records or query any ID.
IDOR_LEVEL_2_COOKIE_TAMPERING=Secure login, but the object ID is controlled by a client-side cookie. Modifying the userId_level2 cookie value exposes other users' data.
IDOR_LEVEL_3_JWT_TAMPERING=Secure login via token, but authorization is based on a client-side role_level3 cookie. Changing this cookie to ADMIN bypasses access controls.
IDOR_LEVEL_4_BROKEN_RBAC=Secure login with Base64-encoded role cookie, but cookie values can be tampered with client-side. Modify the role_level4 cookie to 'ADMIN' to bypass authorization.
IDOR_LEVEL_5_SECURE_RBAC=Secure login with proper server-side authorization. The server validates that the user owns the requested resource or has admin privileges before returning data. Cross-user access is blocked.

# Clickjacking Vulnerability
CLICKJACKING_VULNERABILITY=Clickjacking (also known as a UI redress attack) is when an attacker uses multiple transparent or opaque layers to trick a user into clicking on a button or link on another page when they were intending to click on the top-level page. \
Clickjacking attacks exploit the ability of browsers to embed pages in iframes. An attacker creates a malicious page that loads the target site in a transparent iframe overlaid on top of a decoy UI. When the user clicks what they think is a legitimate button, they are actually clicking on the hidden, embedded page. \
<br/><br/>The primary defenses against clickjacking are HTTP response headers that instruct the browser whether a page is allowed to be framed. \
<br/><br/>Important Links:<br/>\
<ol> <li> <a href="https://owasp.org/www-community/attacks/Clickjacking" target="_blank">OWASP Clickjacking Attack</a>  \
 <li> <a href="https://cheatsheetseries.owasp.org/cheatsheets/Clickjacking_Defense_Cheat_Sheet.html" target="_blank">OWASP Clickjacking Defense Cheat Sheet</a> \
 <li> <a href="https://cwe.mitre.org/data/definitions/1021.html" target="_blank">CWE-1021: Improper Restriction of Rendered UI Layers or Frames</a> \
 <li> <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Frame-Options" target="_blank">MDN: X-Frame-Options</a> \
 <li> <a href="https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors" target="_blank">MDN: CSP frame-ancestors</a> \
</ol>

#### Attack Vector Description
CLICKJACKING_NO_FRAMING_PROTECTION=No X-Frame-Options or Content-Security-Policy frame-ancestors header is set. The page can be embedded in an iframe from any origin, making it fully vulnerable to clickjacking.
CLICKJACKING_X_FRAME_OPTIONS_ALLOWALL=X-Frame-Options header is set to ALLOWALL, which explicitly permits embedding from any origin. This is equivalent to having no protection.
CLICKJACKING_X_FRAME_OPTIONS_SAMEORIGIN=X-Frame-Options header is set to SAMEORIGIN, which only allows the page to be embedded by pages on the same origin. Cross-origin clickjacking is prevented, but same-origin framing is still allowed.
CLICKJACKING_OVERLAY_NO_PROTECTION=No framing protection header is set. This level demonstrates a UI overlay attack: the attacker overlays a nearly-transparent victim page on top of fake "prize" content. The victim clicks what appears to be a prize button but unknowingly triggers a sensitive action on the victim page.
CLICKJACKING_OVERLAY_SAMEORIGIN=X-Frame-Options header is set to SAMEORIGIN, but this only prevents cross-origin framing. A same-origin attacker page can still overlay the victim page and perform a UI redress attack. This level shows that SAMEORIGIN alone is insufficient when the attacker controls a page on the same origin.
CLICKJACKING_X_FRAME_OPTIONS_DENY=X-Frame-Options header is set to DENY, preventing the page from being embedded in any iframe regardless of origin. This is a secure configuration.
CLICKJACKING_CSP_FRAME_ANCESTORS_NONE=Content-Security-Policy frame-ancestors 'none' header is set, which is the modern and recommended way to prevent clickjacking. It supersedes X-Frame-Options and offers finer-grained control.

### LDAP Injection Vulnerability
LDAP_INJECTION_VULNERABILITY=<b>LDAP Injection</b> occurs when user-supplied input is directly concatenated into LDAP queries or filters without proper validation or escaping. LDAP (Lightweight Directory Access Protocol) is commonly used by applications to query directory services for authentication, user information, and organizational data.<br/><br/>\
When applications construct LDAP filters using untrusted input, attackers can inject special LDAP characters such as <code>*</code>, <code>(</code>, <code>)</code>, <code>|</code>, or <code>&</code> to modify the intended query logic. By manipulating the filter structure, attackers may retrieve unintended directory entries, bypass authentication checks, or access sensitive information stored in the directory.<br/><br/>\
For example, if an application builds a filter like <code>(uid={username})</code>, an attacker might supply input such as <code>*)(uid=*</code>. This changes the query logic and may cause the directory server to return all user records instead of a specific one.<br/><br/>\
Proper prevention techniques include validating user input, escaping special LDAP characters, or using safe APIs that automatically encode user input before constructing LDAP filters.<br/><br/>\
<p><b>NOTE:</b> Each level progressively demonstrates how improper handling of LDAP filters can lead to security vulnerabilities and how proper encoding mitigates these risks.</p><br/><br/>\
Important Links:<br/>\
<ol> <li> <a href="https://owasp.org/www-community/attacks/LDAP_Injection">OWASP LDAP Injection</a> \
    <li> <a href="https://portswigger.net/kb/issues/00100e00_ldap-injection">PortSwigger LDAP Injection</a> \
</ol>
LDAP_LEVEL_1_BASIC_INJECTION=Username Enumeration via LDAP filter manipulation. The application directly inserts user input into the LDAP filter without validation. Attackers can use wildcard characters (*) to discover valid username present in the directory.
LDAP_LEVEL_2_OR_BYPASS=Information Disclosure and Username Enumeration via LDAP Injection. The application constructs LDAP queries using unsanitized input and logical conditions. Attackers can manipulate filters using wildcards (*) or partial patterns to retrieve multiple user entries and explore the directory structure.
LDAP_LEVEL_3_AUTH_BYPASS=Authentication Bypass via LDAP Injection. The application uses user input in authentication filters. Attackers can inspect wildcard or crafted inputs to bypass password validation and authenticate as another user without knowing valid credentials.
LDAP_LEVEL_4_INPUT_SANITIZATION=This level demonstrates input encoding using a safe LDAP filter encoder. \ Special characters are escaped before constructing the LDAP query, preventing basic LDAP injection attacks. \ 
LDAP_LEVEL_5_BLIND_INJECTION=Blind LDAP Injection leading to Authentication Bypass. The application does not display user data but reveals success or failure responses. Attackers can manipulate LDAP filters to bypass authentication or infer valid credentials.
LDAP_LEVEL_6_SECURE=This level demonstrates a fully secure LDAP authentication implementation. \ User input is properly encoded, password verification is done using salted hashing, \ and no sensitive infformation is exposed in responses. LDAP Injection is not possible.

### Authentication Vulnerability
AUTHENTICATION_VULNERABILITY=<b>Authentication Vulnerabilities</b> occur when an application's login mechanism is implemented insecurely, \
allowing attackers to compromise user accounts. Common weaknesses include SQL injection in the login query, logging sensitive data, storing passwords in plaintext or with weak hashing algorithms (MD5, SHA1), \
providing different error messages that allow username enumeration, and lacking strong password policies.<br/><br/>\
These vulnerabilities are covered under OWASP Top 10 A07:2021 \u2013 Identification and Authentication Failures.<br/><br/>\
<b>Note:</b> For most levels, you can explore the database contents directly at the H2 Console:<br/>\
- Legacy UI: <a href=\"http://localhost:9090/VulnerableApp/h2/\" target=\"_blank\">http://localhost:9090/VulnerableApp/h2/</a><br/>\
- Docker UI: <a href=\"http://localhost/VulnerableApp/h2/login.jsp\" target=\"_blank\">http://localhost/VulnerableApp/h2/login.jsp</a><br/>\
(URL: <code>jdbc:h2:mem:testdb</code>, Username: <code>readonly_user</code>, Password: <code>readonly_password</code>)<br/><br/>\
Important Links:<br/>\
<ol> <li> <a href=\"https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/\" target=\"_blank\">OWASP Top 10 - A07:2021</a>  \
 <li> <a href=\"https://cwe.mitre.org/data/definitions/287.html\" target=\"_blank\">CWE-287: Improper Authentication</a> \
 <li> <a href=\"https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html\" target=\"_blank\">OWASP Authentication Cheat Sheet</a> \
 <li> <a href=\"https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html\" target=\"_blank\">OWASP Password Storage Cheat Sheet</a> \
</ol>

#### Attack Vector Description
AUTH_LEVEL_1_SQL_INJECTION=The login query uses string concatenation, allowing an attacker to bypass authentication using a simple ' OR 1=1 \u2014 payload. This highlights the importance of using Parameterized Queries (Prepared Statements). Check the database to see the <code>auth_users</code> table.
AUTH_LEVEL_2_LOGGING=The application logs the provided password in plaintext. Check the server logs (console or log file) to see exposed credentials. This demonstrates a sensitive logging issue and why sensitive data should never be logged.
AUTH_LEVEL_3_PLAINTEXT=Password is stored in plaintext in the database and returned in the API response. An attacker with database access (SQL injection, backup leak, insider threat) can read all passwords directly. Check the DB at the URL provided in the module description.
AUTH_LEVEL_4_MD5=Password is hashed using MD5, which is cryptographically broken and should never be used for password storage. MD5 hashes can be reversed using rainbow tables in seconds.
AUTH_LEVEL_5_SHA1=Password is hashed using SHA-1, which is deprecated and considered insecure since 2017. SHA-1 remains vulnerable to collision attacks and rainbow table lookups.
AUTH_LEVEL_6_SHA256_NOSALT=Password is hashed using SHA-256 but without a salt. While SHA-256 is stronger than MD5, the absence of a unique salt allows for large-scale precomputed (rainbow table) attacks.
AUTH_LEVEL_7_USERNAME_ENUMERATION=The application returns different error messages for non-existent users (\"User not found\") vs wrong passwords (\"Invalid password\"). This enables an attacker to discover valid usernames on the system.
AUTH_LEVEL_8_WEAK_PASSWORD=Credentials are passed in the POST body to avoid URI logging, and strong hashing (BCrypt) is used. However, the password itself is weak. This level teaches that both a strong algorithm and a strong password policy are necessary for security.
AUTH_LEVEL_9_SECURE=Secure baseline: Credentials passed in the POST body, BCrypt hashing with unique salts, and a generic \"Invalid credentials\" error message regardless of the failure cause, preventing cracking and enumeration.
AUTH_PAYLOAD_LEVEL_8=Try logging in with 'admin_weak' and a common weak password (hint: it starts with 'password'). Even with strong BCrypt hashing, a weak password can be easily guessed.
AUTH_PAYLOAD_LEVEL_9=This is the secure implementation. Try to enumerate usernames or crack the hash \u2014 you will find it significantly more difficult!
AUTH_LEVEL_10_LOW_ITERATION_HASHING=The application utilizes a modern adaptive hashing algorithm (BCrypt) but configures it with a dangerously low work factor/cost parameter (Cost: 4). This significantly reduces the computational cycles required to generate a hash, making the password database highly vulnerable to rapid offline brute-force and dictionary attacks if compromised.
AUTH_PAYLOAD_LEVEL_10=Submit standard credentials (e.g., admin/admin) to witness the computational speed and exposure of the weak BCrypt hash returned in the metadata payload.

#### Challenge Cards (Challenge Mode)
AUTHENTICATION_VULNERABILITY_LEVEL_1_CHALLENGE=Log in as admin_sqli without knowing the real password. The login query concatenates your input directly into the SQL string.
AUTHENTICATION_VULNERABILITY_LEVEL_1_HINT_1=The password parameter is dropped straight into the WHERE clause. The username is optional - a known account is admin_sqli.
AUTHENTICATION_VULNERABILITY_LEVEL_1_HINT_2=Make the condition always true. AND binds tighter than OR, so an always-true OR clause overrides the password check.
AUTHENTICATION_VULNERABILITY_LEVEL_1_HINT_3=Close the open quote, add OR '1'='1, and comment out the rest with -- (the trailing space matters in H2).
AUTHENTICATION_VULNERABILITY_LEVEL_1_PAYLOAD_DESCRIPTION=SQL injection in the password parameter that bypasses authentication.
AUTHENTICATION_VULNERABILITY_LEVEL_1_PAYLOAD_VALUE=' OR '1'='1' --
AUTHENTICATION_VULNERABILITY_LEVEL_2_CHALLENGE=Make a login attempt and confirm that the submitted password is written to the server logs in plaintext, demonstrating a sensitive-data-logging flaw.
AUTHENTICATION_VULNERABILITY_LEVEL_2_HINT_1=Passwords and other sensitive data should never be written to logs; they leak via log files, log aggregators, and backups.
AUTHENTICATION_VULNERABILITY_LEVEL_2_HINT_2=This endpoint logs the submitted password on every attempt. Trigger a login with any password.
AUTHENTICATION_VULNERABILITY_LEVEL_2_HINT_3=Open the server console or log file and find the line that records the username and password in plaintext.
AUTHENTICATION_VULNERABILITY_LEVEL_2_PAYLOAD_DESCRIPTION=Trigger a login and inspect the server logs to confirm the password is recorded in plaintext.
AUTHENTICATION_VULNERABILITY_LEVEL_2_PAYLOAD_VALUE=Submit any login, then read the console/log line beginning "Login attempt for user:" that prints the username and password in plaintext.
AUTHENTICATION_VULNERABILITY_LEVEL_3_CHALLENGE=Log in as admin_plain. The password is stored in plaintext in the database - retrieve and use it.
AUTHENTICATION_VULNERABILITY_LEVEL_3_HINT_1=Plaintext storage means anyone with database access (SQLi, backup leak, insider) can read passwords instantly.
AUTHENTICATION_VULNERABILITY_LEVEL_3_HINT_2=Open the H2 console at /h2 and query the auth_users table for the admin_plain row.
AUTHENTICATION_VULNERABILITY_LEVEL_3_HINT_3=Read the password column for admin_plain and submit it; on success the app even echoes passwordInDB.
AUTHENTICATION_VULNERABILITY_LEVEL_3_PAYLOAD_DESCRIPTION=Read the plaintext password from the database via the H2 console and authenticate.
AUTHENTICATION_VULNERABILITY_LEVEL_3_PAYLOAD_VALUE=SELECT username,password FROM auth_users WHERE username='admin_plain' (run in the /h2 console).
AUTHENTICATION_VULNERABILITY_LEVEL_4_CHALLENGE=Inspect how admin_md5's password is stored. Find the stored hash in the database and recognize why MD5 makes this account easy to compromise.
AUTHENTICATION_VULNERABILITY_LEVEL_4_HINT_1=MD5 is cryptographically broken and unfit for passwords; it has no salt and no work factor, and identical inputs always yield the same hash.
AUTHENTICATION_VULNERABILITY_LEVEL_4_HINT_2=Open the H2 console (/h2) and read the stored value for admin_md5 in auth_users; the password is kept as a raw, unsalted MD5 digest.
AUTHENTICATION_VULNERABILITY_LEVEL_4_HINT_3=Because MD5 is fast and unsalted, anyone who reads this hash could recover a weak password offline in seconds with a wordlist or rainbow table (e.g. hashcat -m 0).
AUTHENTICATION_VULNERABILITY_LEVEL_4_PAYLOAD_DESCRIPTION=Read the stored MD5 hash from the database and identify the weak, unsalted hashing scheme that exposes the password to offline cracking.
AUTHENTICATION_VULNERABILITY_LEVEL_4_PAYLOAD_VALUE=SELECT username,password,algorithm FROM auth_users WHERE username='admin_md5' (run in the /h2 console) - note the raw, unsalted MD5.
AUTHENTICATION_VULNERABILITY_LEVEL_5_CHALLENGE=Inspect how admin_sha1's password is stored. Locate the stored hash in the database and recognize why SHA-1 is unsafe for passwords.
AUTHENTICATION_VULNERABILITY_LEVEL_5_HINT_1=SHA-1 has been deprecated since 2017; here it is stored fast and unsalted, which is unsuitable for passwords.
AUTHENTICATION_VULNERABILITY_LEVEL_5_HINT_2=Open the H2 console (/h2) and read the stored value for admin_sha1 in auth_users; it is a raw, unsalted SHA-1 digest.
AUTHENTICATION_VULNERABILITY_LEVEL_5_HINT_3=Like MD5, a fast unsalted SHA-1 lets anyone with the hash recover a weak password offline with a wordlist or rainbow table (e.g. hashcat -m 100).
AUTHENTICATION_VULNERABILITY_LEVEL_5_PAYLOAD_DESCRIPTION=Read the stored SHA-1 hash from the database and identify the fast, unsalted scheme that exposes weak passwords to offline cracking.
AUTHENTICATION_VULNERABILITY_LEVEL_5_PAYLOAD_VALUE=SELECT username,password,algorithm FROM auth_users WHERE username='admin_sha1' (run in the /h2 console) - note the raw, unsalted SHA-1.
AUTHENTICATION_VULNERABILITY_LEVEL_6_CHALLENGE=Inspect how admin_sha256's password is stored. Find the stored hash and recognize why SHA-256 without a salt is still weak for passwords.
AUTHENTICATION_VULNERABILITY_LEVEL_6_HINT_1=SHA-256 is a strong general-purpose hash, but it is fast and here it is stored with no salt.
AUTHENTICATION_VULNERABILITY_LEVEL_6_HINT_2=Open the H2 console (/h2) and read the stored value for admin_sha256; compare it with other users to confirm there is no per-user salt.
AUTHENTICATION_VULNERABILITY_LEVEL_6_HINT_3=With no salt and a fast algorithm, identical passwords give identical hashes and weak passwords fall to precomputed or wordlist attacks (e.g. hashcat -m 1400).
AUTHENTICATION_VULNERABILITY_LEVEL_6_PAYLOAD_DESCRIPTION=Read the unsalted SHA-256 hash from the database and identify why a missing salt plus a fast hash exposes weak passwords.
AUTHENTICATION_VULNERABILITY_LEVEL_6_PAYLOAD_VALUE=SELECT username,password,salt,algorithm FROM auth_users WHERE username='admin_sha256' (run in the /h2 console) - note the empty salt.
AUTHENTICATION_VULNERABILITY_LEVEL_7_CHALLENGE=The login returns different errors for unknown users versus wrong passwords. Use that to discover a valid username.
AUTHENTICATION_VULNERABILITY_LEVEL_7_HINT_1=Compare the messages: a fake user returns "User not found"; a real user with a bad password returns "Invalid password".
AUTHENTICATION_VULNERABILITY_LEVEL_7_HINT_2=This difference confirms which usernames exist without knowing any password - the basis for targeted attacks.
AUTHENTICATION_VULNERABILITY_LEVEL_7_HINT_3=Submit candidate usernames with any password; the one returning "Invalid password" is a valid account.
AUTHENTICATION_VULNERABILITY_LEVEL_7_PAYLOAD_DESCRIPTION=Distinguish valid usernames by comparing the "User not found" and "Invalid password" responses.
AUTHENTICATION_VULNERABILITY_LEVEL_7_PAYLOAD_VALUE=Send admin_enum with any password to get "Invalid password"; a fake user returns "User not found".
AUTHENTICATION_VULNERABILITY_LEVEL_8_CHALLENGE=Log in as admin_weak. BCrypt protects the hash, but the password itself is weak and guessable.
AUTHENTICATION_VULNERABILITY_LEVEL_8_HINT_1=Strong hashing cannot save a weak password - the human-chosen secret is the weak link.
AUTHENTICATION_VULNERABILITY_LEVEL_8_HINT_2=This account uses one of the most common passwords. Try a short list of top passwords.
AUTHENTICATION_VULNERABILITY_LEVEL_8_HINT_3=It is a very common password that starts with "password" - try it via the POST login form.
AUTHENTICATION_VULNERABILITY_LEVEL_8_PAYLOAD_DESCRIPTION=Online dictionary or guessing attack against admin_weak using a common-password list.
AUTHENTICATION_VULNERABILITY_LEVEL_8_PAYLOAD_VALUE=POST username=admin_weak with a top-10 common password (rockyou-style, "password" plus digits).
AUTHENTICATION_VULNERABILITY_LEVEL_10_CHALLENGE=Log in as admin_lowcost. The password is hashed with BCrypt, but its work factor is set far too low - recover the password and authenticate.
AUTHENTICATION_VULNERABILITY_LEVEL_10_HINT_1=BCrypt is only as strong as its cost (work) factor; a low cost makes offline brute-force and wordlist attacks dramatically faster.
AUTHENTICATION_VULNERABILITY_LEVEL_10_HINT_2=Open the H2 console (/h2) and read admin_lowcost's stored hash; the number after $2a$ is the cost factor - here it is 04, far below the recommended 10-12.
AUTHENTICATION_VULNERABILITY_LEVEL_10_HINT_3=Because the cost is only 4, a common password falls quickly to a wordlist attack (hashcat -m 3200); recover it and log in via the POST form.
AUTHENTICATION_VULNERABILITY_LEVEL_10_PAYLOAD_DESCRIPTION=Read the low-cost BCrypt hash from the database, crack it offline with a wordlist, and log in.
AUTHENTICATION_VULNERABILITY_LEVEL_10_PAYLOAD_VALUE=SELECT username,password FROM auth_users WHERE username='admin_lowcost' (run in the /h2 console) - note the $2a$04$ cost factor, then hashcat -m 3200.

# Cache Poisoning Vulnerability
CACHE_POISONING_VULNERABILITY=Web Cache Poisoning occurs when an attacker manipulates a shared web cache\u2014such as a <b>CDN</b>, <b>Reverse Proxy</b>, or <b>Load Balancer</b>\u2014to store a malicious or unintended response. These systems are designed to optimize performance by serving cached versions of frequently requested resources to reduce latency and backend load. The attack succeeds when there is a discrepancy between the <b>Cache Key</b> (the set of request attributes the cache uses to identify a resource) and the application's processing logic. By manipulating <b>unkeyed inputs</b> (headers, cookies, or parameters that are reflected in the response but not included in the cache key), an attacker can "poison" the cache for a specific resource. Once stored, this poisoned response is served to all subsequent users requesting that resource until the cache entry expires or is cleared.<br/><br/>\
Important Links:<br/>\
<ol> <li> <a href="https://owasp.org/www-community/attacks/Cache_Poisoning" target="_blank">OWASP Cache Poisoning</a> \
 <li> <a href="https://portswigger.net/web-security/web-cache-poisoning" target="_blank">PortSwigger Web Cache Poisoning</a> \
 <li> <a href="https://www.rfc-editor.org/rfc/rfc9111.html" target="_blank">RFC 9111 - HTTP Caching</a> \
 <li> <a href="https://www.youtube.com/watch?v=r2NWdLvb_lE&list=PLGb2cDlBWRUUvoGqcCF1xe86AaRXGSMT5" target="_blank">Youtube Lab: Web cache poisoning</a> \
 <li> <a href="https://www.youtube.com/watch?v=bDxYWGxuVqE&t=1s" target="_blank">Youtube: Novel Web Cache Poisoning Techniques</a> \
</ol>
CACHE_POISONING_LEVEL_1_ROUTE_ONLY_CACHE_KEY=This level demonstrates a cache key that only includes the request path (route). The application reflects a query parameter in the response but does not include it in the cache key. An attacker can poison the resource for all users by providing a malicious parameter in the first request.
CACHE_POISONING_LEVEL_1_XSS=Cross-Site Scripting (XSS) via Cache Poisoning. Since the banner parameter is reflected without sanitization and the cache only keys on the route, an attacker can store a malicious script in the cache that will execute for all subsequent users.
CACHE_POISONING_LEVEL_2_NAIVE_FILTER=This level attempts to fix the issue by stripping script tags from the input, but the cache key still only uses the route. Attackers can still poison the cache with misleading content or other HTML payloads that bypass the naive filter.
CACHE_POISONING_LEVEL_2_XSS=XSS via Cache Poisoning with Filter Bypass. The application strips obvious <script> tags, but does not sanitize other HTML attributes. Attackers can use event handlers like 'onerror' in tags like <img> to execute scripts and poison the cache.
CACHE_POISONING_LEVEL_3_UNKEYED_FORWARDED_HOST=This level includes the query parameter in the cache key but still trusts the <code>X-Forwarded-Host</code> header to build absolute URLs for assets. Since the shared cache does not include this header in its key (Unkeyed Header), an attacker can poison the asset host for all subsequent visitors.
CACHE_POISONING_LEVEL_3_JS_INJECTION=JavaScript Injection via Cache Poisoning. Since the application trusts the X-Forwarded-Host header to build asset URLs, an attacker can poison the cache to point to a malicious domain, causing all users to load and execute external scripts.
CACHE_POISONING_LEVEL_4_PUBLIC_CACHE_PERSONALIZED_CONTENT=This level demonstrates the danger of caching personalized content (driven by cookies) as public. The response body varies per user (username, email, last login IP) because it reads the <code>demo_user</code> cookie, but the cookie is an <b>unkeyed input</b> - it never participates in the cache key. The shared cache stores the response under the route alone with <code>Cache-Control: public</code>, so the first requester's PII is served to every subsequent visitor for the rest of the TTL.
CACHE_POISONING_LEVEL_5_SECURE_CACHE_POLICY=This secure level demonstrates proper cache isolation. It ignores untrusted forwarding headers and marks personalized or sensitive responses as <code>private</code> and <code>no-store</code>, preventing shared caches from storing and reusing them across different users.

