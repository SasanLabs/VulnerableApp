CLICKJACKING_VULNERABILITY_LEVEL_6_PAYLOAD_DESCRIPTION=Transparent iframe overlay attack

CLICKJACKING_VULNERABILITY_LEVEL_7_CHALLENGE=SAMEORIGIN is set but a same-origin attacker page can still overlay the victim. Perform the overlay attack from the same origin.
CLICKJACKING_VULNERABILITY_LEVEL_7_HINT_1=SAMEORIGIN does not protect against same-origin attackers.
CLICKJACKING_VULNERABILITY_LEVEL_7_HINT_2=Host your attack page on the same origin as the victim.
CLICKJACKING_VULNERABILITY_LEVEL_7_HINT_3=Use the same overlay technique as Level 6 from the same origin.
CLICKJACKING_VULNERABILITY_LEVEL_7_PAYLOAD_DESCRIPTION=Same-origin overlay attack bypassing SAMEORIGIN

