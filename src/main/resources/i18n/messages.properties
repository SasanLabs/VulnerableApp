# Clickjacking Challenge Mode
CLICKJACKING_VULNERABILITY_LEVEL_1_CHALLENGE=Embed this page in an iframe from a different origin and trick a user into clicking a hidden button.
CLICKJACKING_VULNERABILITY_LEVEL_1_HINT_1=This page sets no X-Frame-Options or CSP header.
CLICKJACKING_VULNERABILITY_LEVEL_1_HINT_2=Create an HTML page with an iframe pointing to this URL.
CLICKJACKING_VULNERABILITY_LEVEL_1_HINT_3=Overlay a transparent iframe over a fake button to hijack the click.
CLICKJACKING_VULNERABILITY_LEVEL_1_PAYLOAD_DESCRIPTION=HTML page embedding the vulnerable page in an iframe

CLICKJACKING_VULNERABILITY_LEVEL_2_CHALLENGE=The page sets X-Frame-Options: ALLOWALL. Embed it in an iframe from any origin.
CLICKJACKING_VULNERABILITY_LEVEL_2_HINT_1=ALLOWALL explicitly permits embedding from any origin.
CLICKJACKING_VULNERABILITY_LEVEL_2_HINT_2=This header provides no protection against clickjacking.
CLICKJACKING_VULNERABILITY_LEVEL_2_HINT_3=Same attack as Level 1 works here.
CLICKJACKING_VULNERABILITY_LEVEL_2_PAYLOAD_DESCRIPTION=iframe embedding allowed by ALLOWALL header

CLICKJACKING_VULNERABILITY_LEVEL_3_CHALLENGE=The page sets X-Frame-Options: SAMEORIGIN. Can you still embed it from the same origin?
CLICKJACKING_VULNERABILITY_LEVEL_3_HINT_1=SAMEORIGIN only blocks cross-origin framing.
CLICKJACKING_VULNERABILITY_LEVEL_3_HINT_2=A page hosted on the same origin can still embed this page.
CLICKJACKING_VULNERABILITY_LEVEL_3_HINT_3=Host your attack page on the same domain to bypass SAMEORIGIN.
CLICKJACKING_VULNERABILITY_LEVEL_3_PAYLOAD_DESCRIPTION=Same-origin iframe bypassing SAMEORIGIN restriction

CLICKJACKING_VULNERABILITY_LEVEL_6_CHALLENGE=Use a UI overlay attack to trick the user into clicking a hidden sensitive button under a fake prize button.
CLICKJACKING_VULNERABILITY_LEVEL_6_HINT_1=There is no framing protection on this page.
CLICKJACKING_VULNERABILITY_LEVEL_6_HINT_2=Overlay a nearly transparent iframe over a decoy element.
