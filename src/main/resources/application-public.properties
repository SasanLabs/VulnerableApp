spring.datasource.admin.username=${DB_ADMIN_USERNAME}
spring.datasource.admin.password=${DB_ADMIN_PASSWORD}

spring.datasource.application.username=application
spring.datasource.application.password=${DB_APP_PASSWORD}

spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN