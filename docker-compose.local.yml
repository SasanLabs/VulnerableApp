version: '3'
services:
  VulnerableApp-base:
    image: sasanlabs/owasp-vulnerableapp:unreleased
    # We assume the image is built locally using ./gradlew jibDockerBuild
    
  VulnerableApp-jsp:
    image: sasanlabs/owasp-vulnerableapp-jsp:latest

  VulnerableApp-php:
    image: sasanlabs/owasp-vulnerableapp-php:latest

  mailpit:
    image: axllent/mailpit:v1.30.1
    restart: unless-stopped
    expose:
      - "1025"
    ports:
      - "8025:8025"
    environment:
      - MP_MAX_MESSAGES=5000
      - MP_DATABASE=/data/mailpit.db
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    volumes:
      - mailpit_data:/data
  
  VulnerableApp-facade:
    depends_on:
      - VulnerableApp-base
      - VulnerableApp-jsp
      - VulnerableApp-php
      - mailpit
    image: sasanlabs/owasp-vulnerableapp-facade:latest
    ports:
      - "80:80"
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

volumes:
  mailpit_data: