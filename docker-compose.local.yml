version: "3.9"
services:
    VulnerableApp-base:
      image: sasanlabs/owasp-vulnerableapp:unreleased
      networks:
        - app_net

    mailpit:
      image: axllent/mailpit:v1.30.1
      restart: unless-stopped
      expose:
        - "1025"
      ports:
        - "8025:8025"
      environment:
        - MP_MAX_MESSAGES=5000
        - MP_DATABASE=/data/mailpit.db
        - MP_SMTP_AUTH_ACCEPT_ANY=1
        - MP_SMTP_AUTH_ALLOW_INSECURE=1
        - MP_WEBROOT=/mailpit
      volumes:
        - mailpit_data:/data
      networks:
        app_net:
          aliases:
            - mailpit
    
    VulnerableApp-facade:
      depends_on:
        - VulnerableApp-base
        - mailpit
      image: sasanlabs/owasp-vulnerableapp-facade:latest
      volumes:
       - ./templates:/etc/nginx/templates
      ports:
       - "80:80"
      environment:
       - NGINX_HOST=foobar.com
       - NGINX_PORT=80
      networks:
        - app_net

networks:
  app_net:
    name: vulnerableapp-facade_net
    driver: bridge

volumes:
  mailpit_data:
