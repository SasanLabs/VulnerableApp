name: First Time Contributor Form

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  comment-form:
    if: ${{github.event.pull_request.merged == true}}
    runs-on: ubuntu-latest

    steps:
      - name: Check first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TRAFFIC_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            const { data: labels } = await github.rest.issues.listLabelsOnIssue ({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber
            });
            const alreadyTagged = labels.some(label => label.name === 'first-time-contributor');
            if(alreadyTagged) {
              core.setOutput("first_time", "false");
              return ;
            }

            const { data: searchResult } = await github.rest.search.issuesAndPullRequests({ q: `repo:${context.repo.owner}/${context.repo.repo} is:pr author:${username} is:merged` });
            core.setOutput("first_time", searchResult.total_count === 1);

      - name: Comment with form
        if: steps.check.outputs.first_time == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TRAFFIC_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login;
            const formUrl = `https://docs.google.com/forms/d/e/1FAIpQLSfwWVdnULUhtfruA-DN328NwKnBGebaWg9U5y0xivLLxxoMog/viewform?usp=pp_url&entry.1414771947=${username}`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'good first issue',
              state: 'open'
            });
            const available = issues.filter(i => !i.assignee);
            const recommended = available.length > 0 ? available[Math.floor(Math.random() * available.length)] : null;

            const nextIssueBlock = recommended ? `\n\n🎯 **Want to keep going?** Here's a good next issue for you:\n👉 [#${recommended.number} - ${recommended.title}](${recommended.html_url})` : '';
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Thanks for contributing @${username}!
              We’d love to stay in touch and grow SasanLabs 🚀
              👉 Please fill this (takes 30 sec):  
               ${formUrl}
               
               Also consider ⭐ starring the repo if you like it! ${nextIssueBlock}`
            });

      - name: Label the PR
        if: steps.check.outputs.first_time == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TRAFFIC_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['first-time-contributor']
            });   
            
      - name: Trigger all-contributors bot
        if: steps.check.outputs.first_time == 'true'
        uses: actions/github-script@v7
        with: 
          github-token: ${{ secrets.GH_TRAFFIC_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login;
            await github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `@all-contributors please add @${username} for code`
            });
