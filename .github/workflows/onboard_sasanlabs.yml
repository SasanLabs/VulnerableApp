name: First Time Contributor Form

on:
  pull_request:
    types: [closed]

jobs:
  comment-form:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check first-time contributor
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.pull_request.user.login;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100
            });

            const userPRs = pulls.filter(pr => pr.user.login === username);
            core.setOutput("first_time", userPRs.length === 1 || username === 'preetkaran20');

      - name: Comment with form
        if: steps.check.outputs.first_time == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.pull_request.user.login;

            const formUrl = `https://docs.google.com/forms/d/e/1FAIpQLSfwWVdnULUhtfruA-DN328NwKnBGebaWg9U5y0xivLLxxoMog/viewform?usp=pp_url&entry.1414771947=${username}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Thanks for contributing @${username}!
                    We’d love to stay in touch and grow SasanLabs 🚀
                    👉 Please fill this (takes 30 sec):  
                    ${formUrl}
                    Also consider ⭐ starring the repo if you like it!`
            });
