name: Full Repository Security Scan (Gitleaks + Semgrep)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. GITLEAKS (Secrets Scan)
      # =========================
      - name: Run Gitleaks (Full Repo)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        with:
          args: detect --source . --report-format json --report-path gitleaks-results.json

      - name: Print Gitleaks Findings (1 per line)
        run: |
          echo "===== GITLEAKS FINDINGS ====="
          if [ -s gitleaks-results.json ]; then
            jq -r '.[] | "SECRET | \(.RuleID) | \(.File):\(.StartLine) | \(.Description)\n"' gitleaks-results.json > gitleaks-lines.txt
            cat gitleaks-lines.txt
          else
            echo "No secrets found"
          fi

      - name: Upload Gitleaks Results
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results
          path: gitleaks-results.json

      # =========================
      # 4. SEMGREP (Code Scan)
      # =========================
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep (Full Repo)
        run: |
          semgrep scan \
            --config p/auto \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --json \
            --output semgrep-results.json

      - name: Print Semgrep Findings (1 per line)
        run: |
          echo "===== SEMGREP FINDINGS ====="
          jq -r '.results[] | "\(.extra.severity) | \(.check_id) | \(.path):\(.start.line) | \(.extra.message)\n"' semgrep-results.json > semgrep-lines.txt
          cat semgrep-lines.txt

      - name: Upload Semgrep Results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
